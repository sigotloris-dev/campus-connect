<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline · Campus Connect</title>
    <style>
      body {
        margin: 0;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        font-family: system-ui, -apple-system, sans-serif;
        background: #f6f7fb;
        color: #16182b;
        text-align: center;
        padding: 24px;
      }
      .emoji {
        font-size: 56px;
      }
      h1 {
        font-size: 20px;
        margin: 0;
      }
      p {
        color: #6b6f80;
        max-width: 20rem;
      }
      button {
        margin-top: 8px;
        border: 0;
        border-radius: 12px;
        padding: 12px 20px;
        font-weight: 600;
        color: #fff;
        background: linear-gradient(135deg, #ff5a5f, #ff8a5b);
      }
    </style>
  </head>
  <body>
    <div class="emoji">📶</div>
    <h1>You're offline</h1>
    <p>Check your connection and try again. Campus Connect needs the internet to show you new profiles and messages.</p>
    <button onclick="location.reload()">Try again</button>
  </body>
</html>
